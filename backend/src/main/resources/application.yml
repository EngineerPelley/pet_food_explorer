spring:
  application:
    name: pet-food-explorer

  # Datasource connection details are externalized via environment variables so
  # the same build runs locally and elsewhere. Sensible local defaults point at
  # a MySQL 8.x instance installed directly on the machine (no Docker).
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:petfood}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:petfood}
    password: ${DB_PASSWORD:petfood}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Flyway runs the plain .sql migrations in db/migration on startup.
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

server:
  port: 8080

# CORS allowed origin for the Vite dev server. Externalized so it can change per
# environment; see WebCorsConfig.
app:
  cors:
    allowed-origin: ${CORS_ALLOWED_ORIGIN:http://localhost:5173}
