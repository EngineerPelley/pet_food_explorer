# Test profile. The integration test runs against a separate local MySQL
# database (petfood_test) so it never touches development data. See the README
# for why this is used instead of Testcontainers (no Docker on this machine).
spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${TEST_DB_NAME:petfood_test}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USER:petfood}
    password: ${DB_PASSWORD:petfood}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    # Start from a clean schema each test run so migrations + seed data are
    # applied deterministically.
    clean-disabled: false
    clean-on-validation-error: true

app:
  cors:
    allowed-origin: http://localhost:5173
